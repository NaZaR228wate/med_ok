<!doctype html>
<html lang="uk">
<head>
    <meta charset="utf-8" />
    <title>Дякуємо за замовлення</title>
    <meta name="robots" content="noindex,nofollow" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="assets/medok-wordmark.png">
    <meta name="theme-color" content="#23372B">
    <style>
        /* Локальні шрифти дизайн-системи (Piazzolla + IBM Plex Sans) */
        @font-face{font-family:'IBM Plex Sans';font-style:normal;font-weight:400 600;font-display:swap;src:url('assets/fonts/ibmplexsans-cyrillic-ext.woff2') format('woff2');unicode-range:U+0460-052F,U+1C80-1C8A,U+20B4,U+2DE0-2DFF,U+A640-A69F,U+FE2E-FE2F;}
        @font-face{font-family:'IBM Plex Sans';font-style:normal;font-weight:400 600;font-display:swap;src:url('assets/fonts/ibmplexsans-cyrillic.woff2') format('woff2');unicode-range:U+0301,U+0400-045F,U+0490-0491,U+04B0-04B1,U+2116;}
        @font-face{font-family:'IBM Plex Sans';font-style:normal;font-weight:400 600;font-display:swap;src:url('assets/fonts/ibmplexsans-latin.woff2') format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}
        @font-face{font-family:'Piazzolla';font-style:normal;font-weight:500 700;font-display:swap;src:url('assets/fonts/piazzolla-cyrillic-ext.woff2') format('woff2');unicode-range:U+0460-052F,U+1C80-1C8A,U+20B4,U+2DE0-2DFF,U+A640-A69F,U+FE2E-FE2F;}
        @font-face{font-family:'Piazzolla';font-style:normal;font-weight:500 700;font-display:swap;src:url('assets/fonts/piazzolla-cyrillic.woff2') format('woff2');unicode-range:U+0301,U+0400-045F,U+0490-0491,U+04B0-04B1,U+2116;}
        @font-face{font-family:'Piazzolla';font-style:normal;font-weight:500 700;font-display:swap;src:url('assets/fonts/piazzolla-latin.woff2') format('woff2');unicode-range:U+0000-00FF,U+0131,U+0152-0153,U+02BB-02BC,U+02C6,U+02DA,U+02DC,U+0304,U+0308,U+0329,U+2000-206F,U+20AC,U+2122,U+2191,U+2193,U+2212,U+2215,U+FEFF,U+FFFD;}
        :root{
            --bg:#f6f0e3;
            --card:#fffdf8;
            --text:#211a14;
            --muted:#6f6255;
            --accent:#e8b44f;     /* медовий (дизайн-система) */
            --accent-2:#f2cb73;
            --brand:#23372b;      /* лісовий зелений */
            --ok:#23372b;         /* первинна дія — брендовий лісовий */
            --border:rgba(33,26,20,.14);
            --font-display:'Piazzolla', Georgia, 'Times New Roman', serif;
            --font-body:'IBM Plex Sans', system-ui, -apple-system, sans-serif;
            --shadow:0 24px 70px rgba(61,42,21,.12);
        }
        *{box-sizing:border-box}
        :focus-visible{outline:3px solid var(--accent); outline-offset:3px}
        body{font-family:var(--font-body); margin:0; color:var(--text); background:linear-gradient(160deg, var(--bg) 0%, #fffdf8 60%)}

        .wrap{max-width:760px; margin:48px auto; padding:0 20px}
        .card{
            background:var(--card); border:1px solid var(--border); border-radius:18px;
            box-shadow:var(--shadow); padding:28px;
        }
        .hero{
            display:flex; gap:18px; align-items:center; margin-bottom:6px;
        }
        .hgroup h1{margin:0; font-size:26px; font-family:var(--font-display); font-weight:700; letter-spacing:-.01em; line-height:1.15}
        .hgroup p{margin:6px 0 0; color:var(--muted)}
        .mark{
            display:inline-flex; align-items:center; gap:8px;
            background:linear-gradient(180deg, var(--accent-2), var(--accent));
            color:#211a14; padding:6px 10px; border-radius:10px; font-weight:600;
        }
        .code{
            display:inline-flex; align-items:center; gap:10px; user-select:text;
            background:#fbf1d8; border:1px dashed #e0b866; border-radius:12px; padding:6px 10px;
            font-variant-numeric: tabular-nums;
        }
        .row{display:flex; gap:12px; flex-wrap:wrap}
        .row > div{flex:1 1 220px}

        .section{margin-top:20px}
        .section h3{margin:0 0 10px 0; font-size:18px; font-family:var(--font-display); font-weight:600}
        .list{margin:8px 0 0 16px}
        .list li{margin:4px 0}

        .actions{display:flex; gap:12px; flex-wrap:wrap; margin-top:18px}
        .btn{
            display:inline-flex; align-items:center; justify-content:center; gap:8px;
            padding:12px 16px; border-radius:12px; text-decoration:none; border:1px solid var(--border);
            background:#fffdf8; color:var(--text); font-weight:600; transition:.2s transform, .2s box-shadow;
        }
        .btn:hover{transform:translateY(-1px); box-shadow:0 8px 20px rgba(61,42,21,.10)}
        .btn.primary{background:var(--ok); color:#fff; border-color:transparent}
        .btn.copy{background:#fbf1d8}

        /* галочка-анімація */
        .check{
            width:54px; height:54px; min-width:54px; border-radius:50%;
            background:radial-gradient(65% 65% at 50% 50%, #fbe9c4 0%, #e8b44f 100%);
            display:grid; place-items:center; box-shadow:0 8px 24px rgba(154,93,32,.28); position:relative;
        }
        .check svg{width:30px; height:30px; stroke:#23372b; stroke-width:3; fill:none; stroke-linecap:round; stroke-linejoin:round}
        .draw{stroke-dasharray:60; stroke-dashoffset:60; animation:draw .7s .15s ease forwards}
        @keyframes draw { to { stroke-dashoffset:0 } }

        .muted{color:var(--muted)}
        .toast{
            position:fixed; left:50%; bottom:24px; transform:translateX(-50%);
            background:#211a14; color:#fff; padding:10px 14px; border-radius:12px; opacity:0; pointer-events:none;
            transition:.25s opacity; font-size:14px;
        }
        .toast.show{opacity:1}

        @media (prefers-reduced-motion: reduce){
            .draw{animation:none; stroke-dashoffset:0}
            .btn{transition:none}
            .toast{transition:none}
        }
    </style>
</head>
<body>
<div class="wrap">
    <div class="card">
        <div class="hero">
            <div class="check">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path class="draw" d="M20 6L9 17l-5-5" />
                </svg>
            </div>
            <div class="hgroup">
                <span class="mark">Дякуємо! Замовлення прийнято</span>
                <h1>Ми зв’яжемося з вами найближчим часом, щоб уточнити деталі</h1>
            </div>
        </div>
        <p class="code">
            <strong>Номер замовлення:</strong>
            <span id="orderId">—</span>
            <button id="copyBtn" class="btn copy" style="padding:6px 10px">Скопіювати</button>
        </p>

        <div id="summary" class="section" hidden>
            <h3>Підсумок</h3>
            <div class="row">
                <div><b>Ім’я:</b> <span id="name"></span></div>
                <div><b>Телефон:</b> <span id="phone"></span></div>
                <div><b>Оплата:</b> <span id="pay"></span></div>
            </div>
            <div class="row">
                <div><b>Місто (НП):</b> <span id="city"></span></div>
                <div><b>Відділення:</b> <span id="wh"></span></div>
            </div>
            <div id="items" class="section"></div>
            <div id="total" class="section"></div>
        </div>

        <div class="actions">
            <a class="btn primary" href="/index.html">До каталогу меду</a>
            <a class="btn" href="/">На головну</a>
        </div>
    </div>
</div>

<div id="toast" class="toast">Скопійовано ✅</div>

<script>
    (function(){
        // 1) Підставляємо orderId з ?order=...
        const params = new URLSearchParams(location.search);
        const orderId = params.get('order') || '—';
        document.getElementById('orderId').textContent = orderId;

        // 2) Підтягуємо підсумок із sessionStorage (якщо фронт його поклав)
        try {
            const data = JSON.parse(sessionStorage.getItem('medok_last_order') || 'null');
            if (data) {
                const $ = (id)=>document.getElementById(id);
                $('summary').hidden = false;
                $('name').textContent  = data.name || '';
                $('phone').textContent = data.phone || '';
                $('pay').textContent   = data.pay === 'prepay' ? 'Повна передоплата' : 'Накладений платіж';
                $('city').textContent  = data.np_city || '';
                $('wh').textContent    = data.np_warehouse || '';

                const items = document.getElementById('items');
                if (data.from_cart && Array.isArray(data.cart)) {
                    const title = document.createElement('h3');
                    title.textContent = 'Товари';
                    const ul = document.createElement('ul');
                    ul.className = 'list';
                    data.cart.forEach(i=>{
                        const li = document.createElement('li');
                        li.textContent = `${i.type} — ${i.qty} л × ${i.count} шт`;
                        ul.appendChild(li);
                    });
                    items.appendChild(title);
                    items.appendChild(ul);
                    const sum = (typeof data.total === 'number') ? data.total : null;
                    if (sum != null) document.getElementById('total').innerHTML = `<b>Разом:</b> ${sum} грн`;
                } else if (data.honey) {
                    const title = document.createElement('h3');
                    title.textContent = 'Товар';
                    const p = document.createElement('p');
                    p.textContent = `${data.honey}, кількість: ${data.qty} л`;
                    items.appendChild(title);
                    items.appendChild(p);
                }

                // чистимо, щоб не лишалось після F5 (номер у URL все одно є)
                sessionStorage.removeItem('medok_last_order');
            }
        } catch {}

        // 3) Кнопка "Скопіювати"
        const copyBtn = document.getElementById('copyBtn');
        const toast = document.getElementById('toast');
        copyBtn?.addEventListener('click', async () => {
            try {
                await navigator.clipboard.writeText(document.getElementById('orderId').textContent.trim());
                toast.classList.add('show');
                setTimeout(()=>toast.classList.remove('show'), 1200);
            } catch {}
        });
    })();
</script>
</body>
</html>
